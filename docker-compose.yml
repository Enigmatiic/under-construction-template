services:
    website:
        image: nginx:alpine
        restart: unless-stopped
        command: >
            /bin/sh -c "apk add --no-cache git &&
            rm -rf /usr/share/nginx/html/* &&
            git clone --depth 1 https://github.com/Enigmatiic/under-construction-template.git /tmp/site &&
            cp -r /tmp/site/. /usr/share/nginx/html/ &&
            nginx -g 'daemon off;'"
        volumes:
            - talmyma_data:/usr/share/nginx/html/
        labels:
            - traefik.enable=true
            - traefik.http.routers.talmyma.rule=Host(`talmyma.ca`)
            - traefik.http.routers.talmyma.entrypoints=websecure
            - traefik.http.routers.talmyma.tls.certresolver=letsencrypt
            - traefik.http.services.talmyma.loadbalancer.server.port=80
volumes:
    talmyma_data:

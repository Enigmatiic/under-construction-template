services:
 traefik:
 image: traefik:v3.1
 restart: unless-stopped
 command:
 - --providers.docker=true
 - --providers.docker.exposedbydefault=false
 - --entrypoints.web.address=:80
 - --entrypoints.web.http.redirections.entryPoint.to=websecure
 - --entrypoints.web.http.redirections.entryPoint.scheme=https
 - --entrypoints.websecure.address=:443
 - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
 - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
 ports:
 - "80:80"
 - "443:443"
 volumes:
 - /var/run/docker.sock:/var/run/docker.sock:ro
 - traefik-lets:/letsencrypt

 repo-sync:
 image: alpine/git:latest
 restart: unless-stopped
 entrypoint: ["/bin/sh", "-c"]
 command: |
 if [ ! -d /repo/.git ]; then
 git clone --depth 1 https://github.com/Enigmatiic/under-construction-template.git /repo
 fi
 while true; do
 cd /repo
 git pull --ff-only
 sleep 3600
 done
 volumes:
 - site-data:/repo

 website:
 image: nginx:alpine
 restart: unless-stopped
 depends_on:
 - repo-sync
 - traefik
 volumes:
 - site-data:/usr/share/nginx/html:ro
 labels:
 - traefik.enable=true
 - traefik.http.routers.talmyma.rule=Host(`talmyma.ca`,`www.talmyma.ca`)
 - traefik.http.routers.talmyma.entrypoints=websecure
 - traefik.http.routers.talmyma.tls=true
 - traefik.http.routers.talmyma.tls.certresolver=letsencrypt
 - traefik.http.services.talmyma.loadbalancer.server.port=80
 - traefik.docker.network=talmyma_default

volumes:
 site-data:
 traefik-lets:

services:
  website:
  image: nginx:alpine
  container_name: talmyma-website
  restart: unless-stopped
  volumes:
    - ./:/usr/share/nginx/html:ro
  labels:
    - traefik.enable=true
    - traefik.http.routers.talmyma.rule=Host(`talmyma.ca`) || Host(`www.talmyma.ca`)
    - traefik.http.routers.talmyma.entrypoints=websecure
    - traefik.http.routers.talmyma.tls.certresolver=letsencrypt
    - traefik.http.services.talmyma.loadbalancer.server.port=80
    - traefik.docker.network=talmyma_default


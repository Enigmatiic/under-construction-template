services:
    website:
        image: nginx:alpine
        restart: unless-stopped
        command: >
            /bin/sh -c "apk add --no-cache git &&
            rm -rf /usr/share/nginx/html/* &&
            git clone --depth 1 https://github.com/Enigmatiic/under-construction-template.git /tmp/site &&
            cp -r /tmp/site/. /usr/share/nginx/html/ &&
            nginx -g 'daemon off;'"
        ports:
            - "8080:80"
